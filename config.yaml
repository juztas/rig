facilities:
  nersc:
    base_url: "https://api.iri.nersc.gov"
    timeout: 60
  esnet-east:
    base_url: "https://iri-dev.ppg.es.net"
    timeout: 60
  esnet-west:
    base_url: "https://esnet-west.sdn-sense.net"
    timeout: 60
  alcf:
    base_url: "https://api.alcf.anl.gov"
    timeout: 60
  # SENSE-O East orchestrator — RIG exchanges the caller's Globus Bearer token
  # for a SENSE-O access token via RFC 8693 before proxying upstream.
  orchestrator:
    base_url: "https://sense-o-east.es.net:8543"
    timeout: 60
    token_exchange:
      auth_endpoint: "https://sense-o-east.es.net:8543/realms/StackV/protocol/openid-connect/token"
      client_id: "Portal"
      client_secret: ""
      subject_issuer: "https://auth.globus.org"
      verify_tls: false

max_connections: 1000
max_keepalive_connections: 100
default_timeout: 60
log_level: "INFO"
host: "0.0.0.0"
port: 8000
workers: 4

# Docker / local-testing credential store.
# Set vault_backend: docker to enable. Tokens are looked up by user -> project -> facility.
