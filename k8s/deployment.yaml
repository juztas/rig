apiVersion: apps/v1
kind: Deployment
metadata:
  name: rig
  namespace: rig
  labels:
    app: rig
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rig
  template:
    metadata:
      labels:
        app: rig
    spec:
      serviceAccountName: rig
      containers:
        - name: rig
          image: quay.io/amscesnet/rig:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: RIG_CONFIG_PATH
              value: /etc/rig/config.yaml
            - name: RIG_VAULT_BACKEND
              value: "kube"
            - name: RIG_VAULT_KUBE_NAMESPACE
              value: "rig"
            - name: RIG_LOG_LEVEL
              value: "DEBUG"
            - name: RIG_POLICY_ENGINE_URL
              valueFrom:
                secretKeyRef:
                  name: rig-secrets
                  key: RIG_POLICY_ENGINE_URL
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/rig
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: rig-config
