apiVersion: v1
kind: ServiceAccount
metadata:
  name: rig
  namespace: rig
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rig-secret-reader
  namespace: rig
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rig-secret-reader-binding
  namespace: rig
subjects:
  - kind: ServiceAccount
    name: rig
    namespace: rig
roleRef:
  kind: Role
  name: rig-secret-reader
  apiGroup: rbac.authorization.k8s.io
