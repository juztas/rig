apiVersion: v1
kind: ConfigMap
metadata:
  name: rig-config
  namespace: rig-smoke
data:
  config.yaml: |
    facilities:
      echo:
        base_url: "http://echo-upstream.rig-smoke.svc.cluster.local:8080"
        timeout: 15

    max_connections: 200
    max_keepalive_connections: 50
    default_timeout: 15
    log_level: "INFO"
    host: "0.0.0.0"
    port: 8000
    workers: 1
