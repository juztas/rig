apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-upstream
  namespace: rig-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-upstream
  template:
    metadata:
      labels:
        app: echo-upstream
    spec:
      containers:
        - name: echo-upstream
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=upstream-ok"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-upstream
  namespace: rig-smoke
spec:
  selector:
    app: echo-upstream
  ports:
    - port: 8080
      targetPort: 8080
