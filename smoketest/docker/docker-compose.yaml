services:
  echo:
    image: mendhak/http-https-echo:34
    environment:
      HTTP_PORT: "8080"
    expose:
      - "8080"

  rig:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      - echo
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      RIG_CONFIG_PATH: /app/config.yaml
    ports:
      - "8000:8000"
