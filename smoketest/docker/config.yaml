facilities:
  echo:
    base_url: "http://echo:8080"
    tier: 3
    timeout: 30

max_connections: 100
max_keepalive_connections: 20
default_timeout: 30
log_level: "DEBUG"
host: "0.0.0.0"
port: 8000
workers: 1

vault_backend: docker

# JWT subject -> project (X-Project header) -> facility -> token
docker_credentials:
  jbalcas:
    smoke:
      echo: "smoke-vault-token"
